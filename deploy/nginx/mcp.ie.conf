# =====================================================================
# /etc/nginx/conf.d/mcp.ie.conf — IE-MCP-Servers reverse proxy
# Sigue el patron de los demas vhosts en linux.ie (xxx.ie.conf en conf.d/).
# Copiar este archivo al servidor como root:
#   sudo cp deploy/nginx/mcp.ie.conf /etc/nginx/conf.d/mcp.ie.conf
#   sudo nginx -t && sudo nginx -s reload
# =====================================================================

server {
    listen 80;
    server_name mcp.ie;

    # MCP usa HTTP streamable (SSE-like). Desactivar buffering.
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_http_version 1.1;

    # ----------- MCP MSSQL (SQL Server produccion) -----------
    location /mssql/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ----------- MCP IE Docs (markdowns org) -----------
    location /docs/ {
        proxy_pass http://127.0.0.1:5004/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ----------- TODO (TASKS.md): habilitar cuando esten implementados -----------
    # location /glpi/ {
    #     proxy_pass http://127.0.0.1:5002/;
    #     ...
    # }
    # location /openproject/ {
    #     proxy_pass http://127.0.0.1:5003/;
    #     ...
    # }

    # ----------- TODO (TASKS.md): auth -----------
    # Hoy: confianza LAN. Pendiente bearer token o JWT (ver TASKS.md #1).
    # auth_request /_auth;
}
