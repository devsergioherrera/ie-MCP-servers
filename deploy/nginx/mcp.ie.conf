# =====================================================================
# /etc/nginx/conf.d/mcp.ie.conf — IE-MCP-Servers reverse proxy
# Sigue el patron de los demas vhosts en linux.ie (xxx.ie.conf en conf.d/).
# Copiar este archivo al servidor como root:
#   sudo cp deploy/nginx/mcp.ie.conf /etc/nginx/conf.d/mcp.ie.conf
#   sudo nginx -t && sudo nginx -s reload
# =====================================================================

# ----- Log structured JSON con trazabilidad por request -----
# Captura quien (IP + user-agent), que (path), cuando (ts), como salio
# (status + bytes + duracion) y un request_id unico para correlacionar
# con logs de los backends MCP. Sin auth: el "quien" es solo la IP.
log_format mcp_json escape=json
    '{'
        '"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer",'
        '"request_id":"$request_id"'
    '}';

server {
    listen 80;
    server_name mcp.ie;

    # Log accesos a archivo dedicado, formato JSON
    access_log /var/log/nginx/mcp.ie.access.log mcp_json;
    error_log  /var/log/nginx/mcp.ie.error.log warn;

    # MCP usa HTTP streamable (SSE-like). Desactivar buffering.
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_http_version 1.1;

    # ----------- MCP MSSQL Main (SIE + EMPAQUE — solo lectura) -----------
    location /mssql/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";
    }

    # ----------- MCP IE Docs (markdowns org) -----------
    location = /docs/mcp {
        return 301 /docs/mcp/;
    }

    location ^~ /docs/mcp/ {
        proxy_pass http://127.0.0.1:5004/mcp/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";
    }

    # ----------- Docs API (metadata de MCP servers desde dab-config.json) -----------
    # IMPORTANTE: debe ir ANTES de /docs/ para que Nginx lo resuelva primero
    location ^~ /docs/api/ {
        proxy_pass         http://127.0.0.1:5006/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_buffering    off;
    }

    # ----------- UI estatica (landing + docs) -----------
    location /docs/ {
        proxy_pass http://127.0.0.1:5010/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";
    }

    location / {
        proxy_pass http://127.0.0.1:5010/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";
    }

    # ----------- MCP MSSQL Monitor (IE_MONITOR — lectura+escritura) -----------
    location /monitor/ {
        proxy_pass http://127.0.0.1:5005/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";
    }

    # ----------- TODO (TASKS.md): habilitar cuando esten implementados -----------
    # location /glpi/ {
    #     proxy_pass http://127.0.0.1:5002/;
    #     ...
    # }
    # location /openproject/ {
    #     proxy_pass http://127.0.0.1:5003/;
    #     ...
    # }

    # ----------- Auth: PENDIENTE (TASKS.md #1) -----------
    # Hoy: sin autenticacion (confianza LAN). La trazabilidad se basa en
    # remote_addr + user_agent del access log. Cuando se monte el IdP
    # central (probablemente Keycloak) se reemplaza por validacion JWT.
}
