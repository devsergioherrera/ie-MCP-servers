name: ie-mcp

# ============================================================
# Mapa de puertos (secuencial, reserva hasta 5010):
#   5001  mcp-mssql-main      SQL Server SIE + EMPAQUE(PR), solo lectura
#   5002  mcp-mssql-monitor   SQL Server IE_MONITOR, lectura+escritura
#   5003  mcp-ie-docs         MCP Python de markdowns (logica de negocio)
#   5004  mcp-mssql-explorer  MCP Python para explorar SQL (esquema, read-only)
#   5005  mcp-mssql-intranet  SQL Server INTRANET (192.168.50.86), solo lectura
#   5006  mcp-mysql-glpi      (scaffolding — descomentar cuando este listo)
#   5007  mcp-pg-op           (scaffolding — descomentar cuando este listo)
#   5008  mcp-config-vault    Import/export de configs sensibles (auth IAM)
#   5009  mcp-docs-api        FastAPI metadata de MCP servers (uso interno UI)
#   5010  mcp-ui              UI estatica Astro (landing + /info)
# ============================================================

services:
  mcp-mssql-main:
    build: ../data-mcp-servers/mssql
    container_name: mcp-mssql-main
    restart: unless-stopped
    environment:
      MSSQL_SIE_CONN: ${MSSQL_SIE_CONN}
      MSSQL_EMPAQUE_CONN: ${MSSQL_EMPAQUE_CONN}
    ports:
      - "127.0.0.1:5001:5000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-mssql-monitor:
    build: ../data-mcp-servers/mssql-monitor
    container_name: mcp-mssql-monitor
    restart: unless-stopped
    environment:
      MSSQL_MONITOR_CONN: ${MSSQL_MONITOR_CONN}
    ports:
      - "127.0.0.1:5002:5000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-mssql-intranet:
    build: ../data-mcp-servers/mssql-intranet
    container_name: mcp-mssql-intranet
    restart: unless-stopped
    environment:
      MSSQL_INTRANET_CONN: ${MSSQL_INTRANET_CONN}
    ports:
      - "127.0.0.1:5005:5000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-mssql-explorer:
    build: ../data-mcp-servers/mssql-explorer
    container_name: mcp-mssql-explorer
    restart: unless-stopped
    environment:
      MSSQL_SIE_CONN: ${MSSQL_SIE_CONN}
      MSSQL_EMPAQUE_CONN: ${MSSQL_EMPAQUE_CONN}
    volumes:
      - ../data-mcp-servers/mssql:/dab-configs:ro  # whitelist desde el config de DAB
    ports:
      - "127.0.0.1:5004:8000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-ie-docs:
    build: ../docs-mcp-servers/ie-docs
    container_name: mcp-ie-docs
    restart: unless-stopped
    volumes:
      - ../docs:/docs:rw  # rw: el MCP puede editar markdowns
      - ../logs:/logs:rw  # logs estructurados JSON persistidos
    ports:
      - "127.0.0.1:5003:8000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 8000)); s.close()"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  mcp-config-vault:
    build: ../docs-mcp-servers/config-vault
    container_name: mcp-config-vault
    restart: unless-stopped
    environment:
      IAM_BASE_URL: ${IAM_BASE_URL:-https://iam.ie}
      IAM_PUBLIC_KEY_PATH: /keys/public.pem
      # IAM_CA_BUNDLE: /keys/root-ca.pem  # descomentar si login() valida TLS contra la CA interna
    volumes:
      - ${VAULT_HOST_DIR:-/proyectos/_vault}:/vault:rw          # almacen central (fuera de git)
      - ${IAM_KEYS_DIR:-/proyectos/ie-IAM/backend/keys}:/keys:ro # llave publica del IAM (public.pem)
      - ../logs:/logs:rw                                        # auditoria JSONL
    ports:
      - "127.0.0.1:5008:8000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 8000)); s.close()"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  mcp-docs-api:
    build: ../docs-mcp-servers/docs-api
    container_name: mcp-docs-api
    restart: unless-stopped
    volumes:
      - ../data-mcp-servers:/dab-configs:ro   # DAB servers (dab-config.json)
      - ../docs-mcp-servers:/docs-servers:ro  # Custom servers (server-meta.json)
    ports:
      - "127.0.0.1:5009:8001"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  mcp-ui:
    build: ../mcp-ui
    container_name: mcp-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:5010:80"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================================
  # Scaffolding listo, descomentar cuando se definan entidades
  # ============================================================
  # mcp-mysql-glpi:
  #   build: ../data-mcp-servers/mysql-glpi
  #   container_name: mcp-mysql-glpi
  #   ports:
  #     - "127.0.0.1:5006:5000"
  #   networks: [mcp_net]
  #
  # mcp-pg-op:
  #   build: ../data-mcp-servers/postgres-openproject
  #   container_name: mcp-pg-op
  #   ports:
  #     - "127.0.0.1:5007:5000"
  #   networks: [mcp_net]

networks:
  mcp_net:
    name: mcp_net
