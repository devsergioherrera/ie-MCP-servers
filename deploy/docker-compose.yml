name: ie-mcp

services:
  mcp-mssql-main:
    build: ../data-mcp-servers/mssql
    container_name: mcp-mssql-main
    restart: unless-stopped
    environment:
      MSSQL_SIE_CONN: ${MSSQL_SIE_CONN}
      MSSQL_EMPAQUE_CONN: ${MSSQL_EMPAQUE_CONN}
    ports:
      # Solo loopback del host: Nginx (nativo en linux.ie) lo alcanza por 127.0.0.1
      - "127.0.0.1:5001:5000"
    networks: [mcp_net]
    # DAB persiste logs en stdout; Docker los retiene con json-file driver
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # No healthcheck declarado: la imagen DAB es chiseled (sin shell ni curl).
    # restart: unless-stopped basta para reciclar si crashea.

  mcp-mssql-monitor:
    build: ../data-mcp-servers/mssql-monitor
    container_name: mcp-mssql-monitor
    restart: unless-stopped
    environment:
      MSSQL_MONITOR_CONN: ${MSSQL_MONITOR_CONN}
    ports:
      - "127.0.0.1:5005:5000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-ie-docs:
    build: ../docs-mcp-servers/ie-docs
    container_name: mcp-ie-docs
    restart: unless-stopped
    volumes:
      - ../docs:/docs:rw # rw: el MCP puede editar markdowns
      - ../logs:/logs:rw # logs estructurados JSON persistidos
    ports:
      - "127.0.0.1:5004:8000"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 8000)); s.close()"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  mcp-ui:
    build: ../mcp-ui
    container_name: mcp-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:5010:80"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-docs-api:
    build: ../docs-mcp-servers/docs-api
    container_name: mcp-docs-api
    restart: unless-stopped
    volumes:
      - ../data-mcp-servers:/dab-configs:ro  # solo lectura: metadata de los MCP servers
    ports:
      - "127.0.0.1:5006:8001"
    networks: [mcp_net]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ============================================================
  # Scaffolding listo, descomentar cuando se definan entidades
  # ============================================================
  # mcp-mysql-glpi:
  #   build: ../data-mcp-servers/mysql-glpi
  #   container_name: mcp-mysql-glpi
  #   ...
  #
  # mcp-pg-op:
  #   build: ../data-mcp-servers/postgres-openproject
  #   container_name: mcp-pg-op
  #   ...

networks:
  mcp_net:
    name: mcp_net
